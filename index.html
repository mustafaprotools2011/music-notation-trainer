<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>مرجع تدريبات النوتة الموسيقية</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app">

      <!-- ── Top Nav ── -->
      <nav class="topnav">
        <div class="brand">♫</div>
        <div class="module-tabs" id="moduleList" role="tablist"></div>
        <div class="score-strip">
          <span id="scoreText">0 / 0</span>
          <span class="dot">·</span>
          <strong id="masteryText">0%</strong>
          <button class="reset-btn" id="resetProgress" title="مسح التقدم" aria-label="مسح التقدم">↺</button>
        </div>
      </nav>

      <!-- ── Progress bar ── -->
      <div class="progress-track" aria-hidden="true">
        <span id="masteryBar"></span>
      </div>

      <!-- ── Main ── -->
      <main class="main">

        <!-- Exercise card -->
        <div class="exercise-card">
          <div class="card-header">
            <span id="difficultyLabel">مستوى تمهيدي</span>
            <span id="stageLabel">حدد اسم النغمة على المدرج</span>
          </div>

          <svg id="notationCanvas" viewBox="0 0 640 270"
               role="img" aria-label="تمرين نوتة موسيقية"
               style="width:100%;display:block"></svg>

          <div class="question-body">
            <p class="q-type" id="questionType">أسماء النغمات</p>
            <h2 class="q-text" id="questionText">ما اسم النغمة المعروضة؟</h2>
            <div class="answers" id="answers" role="group" aria-label="خيارات الإجابة"></div>
            <div class="feedback" id="feedback" aria-live="polite">
              اختر الإجابة، ثم اقرأ التفسير بصوت واضح للطالب.
            </div>
          </div>

          <button class="new-q-btn" id="newQuestion">سؤال جديد</button>
        </div>

        <!-- Info section -->
        <div class="info-section">

          <div class="concept-card">
            <p class="tag" id="conceptTag">الفكرة الأساسية</p>
            <h3 id="conceptTitle">النغمة لها مكان ثابت</h3>
            <p id="conceptText">اقرأ النغمة من مكانها على الخط أو الفراغ، ثم اربطها باسمها بالحروف.</p>
            <div class="quick-facts" id="quickFacts"></div>
          </div>

          <div class="reference-card">
            <div class="ref-tabs" id="tabs" role="tablist" aria-label="مراجع سريعة"></div>
            <div class="reference-content" id="referenceContent"></div>
            <p class="progress-copy" id="progressCopy">ابدأ بأول تدريب، ثم انتقل خطوة خطوة.</p>
          </div>

        </div>
      </main>

      <!-- Required by app.js -->
      <h2 id="moduleTitle" style="display:none"></h2>

    </div>
    <script src="app.js"></script>
  </body>
</html>
